<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Drawing Renamer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Drawing Renamer</h2>
    <label>Register path (file or directory):</label>
  <input id="register" class="wide" placeholder="Optional: path to register PDF or folder" />
    <button id="choose">Choose folder...</button>
    <label><input type="checkbox" id="dry" /> Dry run (don't rename files)</label>
    <div class="mt">
      <button id="start">Start</button>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script src="renderer.js"></script>
  </body>
</html>
