<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Drawing Renamer</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 16px }
      label { display:block; margin-top:8px }
      #log { white-space: pre-wrap; background:#111; color:#eee; padding:8px; height:300px; overflow:auto }
    </style>
  </head>
  <body>
    <h2>Drawing Renamer</h2>
    <label>Register path (file or directory):</label>
    <input id="register" style="width:70%" placeholder="Optional: path to register PDF or folder" />
    <button id="choose">Choose folder...</button>
    <label><input type="checkbox" id="dry" /> Dry run (don't rename files)</label>
    <div style="margin-top:12px">
      <button id="start">Start</button>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script src="renderer.js"></script>
  </body>
</html>
